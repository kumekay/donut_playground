# Donut leases proxy the serial port over the network (rfc2217). esptool's
# default sync reply window (0.1 s) is shorter than the round-trip time from
# a cloud runner to the hands box, which makes chip sync fail with
# "Download mode successfully detected, but getting no sync reply".
# Widen the request/response timeouts to tolerate WAN latency.
[esptool]
sync_timeout = 1.0
connect_attempts = 14
